services:
  web:
    image: 'gitlab/gitlab-ce:latest'
    restart: always
    hostname: 'wmbp02.local'
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://wmbp02.local'
        # Add any other custom settings here
    ports:
      - '7080:80'
      - '7443:443'
      - '7022:22'
    volumes:
      - './config:/etc/gitlab'
      - './logs:/var/log/gitlab'
      - './data:/var/opt/gitlab'
    shm_size: '256m'